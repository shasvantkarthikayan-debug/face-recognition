<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacePass - Train Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .card {
            background: rgba(20, 20, 35, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .info {
            background: rgba(51, 153, 255, 0.2);
            border-left: 4px solid #3399ff;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
            border-radius: 8px;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-train {
            background: linear-gradient(135deg, #4dbb6f 0%, #2d8a4f 100%);
            color: white;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            color: white;
        }
        
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #4dbb6f;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
        
        .success {
            background: rgba(77, 187, 111, 0.3);
            color: #4dbb6f;
        }
        
        .error {
            background: rgba(204, 51, 102, 0.3);
            color: #cc3366;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Train Model</h1>
            <p>Process captured faces to train the recognition model</p>
        </div>
        
        <div class="card">
            <div class="info">
                <strong>ℹ️ Training Process:</strong><br>
                This will process all captured faces from the known_faces directory and create a trained model for recognition.
            </div>
            
            <button class="btn btn-train" onclick="trainModel()">🚀 Start Training</button>
            <a href="/" class="btn btn-home">🏠 Back to Home</a>
            
            <div class="loader" id="loader"></div>
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <script>
        function trainModel() {
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');
            const trainBtn = document.querySelector('.btn-train');
            
            loader.style.display = 'block';
            status.style.display = 'none';
            trainBtn.disabled = true;
            trainBtn.textContent = '⏳ Training...';
            
            fetch('/train_model', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                trainBtn.disabled = false;
                trainBtn.textContent = '🚀 Start Training';
                
                if (data.status === 'success') {
                    showStatus(`✓ Training complete! Processed ${data.processed} images for ${data.people} people.`, 'success');
                } else {
                    showStatus('❌ Training failed: ' + (data.error || 'Unknown error'), 'error');
                }
            })
            .catch(error => {
                loader.style.display = 'none';
                trainBtn.disabled = false;
                trainBtn.textContent = '🚀 Start Training';
                showStatus('❌ Error: ' + error.message, 'error');
            });
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
