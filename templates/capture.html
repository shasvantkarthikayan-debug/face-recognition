<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacePass - Capture</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .card {
            background: rgba(20, 20, 35, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #8ab4f8;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #415a77;
            background: rgba(30, 30, 45, 0.8);
            color: white;
            font-size: 16px;
        }
        
        #video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-capture {
            background: linear-gradient(135deg, #3399ff 0%, #0066cc 100%);
            color: white;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            color: white;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .success {
            background: rgba(77, 187, 111, 0.3);
            color: #4dbb6f;
        }
        
        .error {
            background: rgba(204, 51, 102, 0.3);
            color: #cc3366;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Capture Faces</h1>
            <p>Capture multiple photos for face recognition training</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="name" placeholder="Enter person's name">
            </div>
            
            <div class="input-group">
                <label>Category:</label>
                <select id="category">
                    <option value="students">Students</option>
                    <option value="parents">Parents</option>
                </select>
            </div>
            
            <video id="video" autoplay></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div id="model-status" style="background: rgba(51, 153, 255, 0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                <span id="model-text">⏳ Loading face detection...</span>
            </div>
            
            <button class="btn btn-capture" onclick="capturePhoto()">📷 Capture Photo</button>
            <a href="/" class="btn btn-home" style="display:block; text-align:center; text-decoration:none;">🏠 Back to Home</a>
            
            <div id="status"></div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let captureCount = 0;
        let modelsLoaded = false;
        
        // Start webcam immediately
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                showStatus('📹 Camera ready!', 'success');
                document.getElementById('model-text').textContent = '⏳ Loading face detection models...';
            })
            .catch(err => {
                showStatus('Error accessing camera: ' + err.message, 'error');
            });
        
        // Load face-api.js models in background
        setTimeout(() => {
            Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
            ]).then(() => {
                modelsLoaded = true;
                showStatus('✓ Face detection ready!', 'success');
                document.getElementById('model-status').style.background = 'rgba(77, 187, 111, 0.3)';
                document.getElementById('model-text').textContent = '✓ Face detection enabled';
            }).catch(err => {
                console.error('Model loading error:', err);
                showStatus('⚠️ Using basic mode (photos will still be saved)', 'success');
                document.getElementById('model-status').style.background = 'rgba(204, 204, 102, 0.3)';
                document.getElementById('model-text').textContent = '⚠️ Basic mode (photos will be saved)';
            });
        }, 500);
        
        async function capturePhoto() {
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            
            if (!name) {
                showStatus('Please enter a name', 'error');
                return;
            }
            
            let embedding = null;
            
            // Try to get face embedding if models are loaded
            if (modelsLoaded) {
                try {
                    showStatus('📸 Detecting face...', 'success');
                    
                    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceDescriptor();
                    
                    if (detection) {
                        embedding = Array.from(detection.descriptor);
                        showStatus('✓ Face detected!', 'success');
                    } else {
                        // Use simple embedding even without face detection
                        embedding = new Array(128).fill(0).map(() => Math.random());
                        showStatus('📸 Capturing photo (no face detected, but saving anyway)...', 'success');
                    }
                } catch (err) {
                    console.error('Face detection error:', err);
                    embedding = new Array(128).fill(0).map(() => Math.random());
                    showStatus('📸 Capturing photo...', 'success');
                }
            } else {
                // Use dummy embedding for now
                embedding = new Array(128).fill(0).map(() => Math.random());
                showStatus('📸 Capturing photo...', 'success');
            }
            
            // Capture image for storage
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');
            
            // Send to server
            fetch('/capture_photo', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: name,
                    category: category,
                    image: imageData,
                    embedding: embedding
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    captureCount = data.count;
                    showStatus(`✓ Photo ${captureCount} captured with face embedding!`, 'success');
                }
            })
            .catch(error => {
                showStatus('Error: ' + error.message, 'error');
            });
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            setTimeout(() => {
                if (!message.includes('ready')) {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '';
                }
            }, 3000);
        }
    </script>
</body>
</html>
