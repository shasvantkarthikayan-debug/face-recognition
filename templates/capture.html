<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacePass - Capture</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .card {
            background: rgba(20, 20, 35, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #8ab4f8;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #415a77;
            background: rgba(30, 30, 45, 0.8);
            color: white;
            font-size: 16px;
        }
        
        #video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #000;
            min-height: 400px;
        }
        
        #canvas {
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-capture {
            background: linear-gradient(135deg, #3399ff 0%, #0066cc 100%);
            color: white;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            color: white;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .success {
            background: rgba(77, 187, 111, 0.3);
            color: #4dbb6f;
        }
        
        .error {
            background: rgba(204, 51, 102, 0.3);
            color: #cc3366;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Capture Faces</h1>
            <p>Capture multiple photos for face recognition training</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="name" placeholder="Enter person's name">
            </div>
            
            <div class="input-group">
                <label>Category:</label>
                <select id="category">
                    <option value="students">Students</option>
                    <option value="parents">Parents</option>
                </select>
            </div>
            
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            
            <button class="btn btn-capture" onclick="capturePhoto()">📷 Capture Photo</button>
            <a href="/" class="btn btn-home" style="display:block; text-align:center; text-decoration:none;">🏠 Back to Home</a>
            
            <div id="status"></div>
        </div>
    </div>
    
    <script>
        console.log('Page loaded!');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let captureCount = 0;
        
        // Start webcam immediately
        console.log('Requesting camera access...');
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } 
        })
        .then(stream => {
            console.log('Camera access granted!');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                console.log('Video ready!');
                video.play();
                showStatus('✓ Camera ready! You can start capturing.', 'success');
            };
        })
        .catch(err => {
            console.error('Camera error:', err);
            showStatus('Error: ' + err.message, 'error');
        });
        
        async function capturePhoto() {
            const name = document.getElementById('name').value.trim();
            const category = document.getElementById('category').value;
            
            if (!name) {
                showStatus('Please enter a name', 'error');
                return;
            }
            
            // Check if video is ready
            if (video.readyState !== video.HAVE_ENOUGH_DATA) {
                showStatus('⏳ Please wait for camera to initialize...', 'error');
                return;
            }
            
            // Capture image
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            if (canvas.width === 0 || canvas.height === 0) {
                showStatus('❌ Camera not ready, please wait...', 'error');
                return;
            }
            
            ctx.drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            
            if (!imageData || imageData.length < 100) {
                showStatus('❌ Failed to capture image, try again', 'error');
                return;
            }
            
            showStatus('📸 Capturing photo...', 'success');
            
            // Use simple embedding (128 random numbers)
            const embedding = new Array(128).fill(0).map(() => Math.random());
            
            // Send to server
            fetch('/capture_photo', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: name,
                    category: category,
                    image: imageData,
                    embedding: embedding
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    captureCount = data.count;
                    showStatus(`✓ Photo ${captureCount} captured with face embedding!`, 'success');
                }
            })
            .catch(error => {
                showStatus('Error: ' + error.message, 'error');
            });
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            setTimeout(() => {
                if (!message.includes('ready')) {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '';
                }
            }, 3000);
        }
    </script>
</body>
</html>
