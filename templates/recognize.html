<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacePass - Recognition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh; padding: 20px; color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .card {
            background: rgba(20, 20, 35, 0.95); border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        #video { width: 100%; border-radius: 10px; margin-bottom: 20px; display: none; background: #000; }
        .btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; display: block; text-align: center;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .btn-start { background: linear-gradient(135deg, #4dbb6f 0%, #2d8a4f 100%); color: white; }
        .btn-stop { background: linear-gradient(135deg, #cc3366 0%, #991144 100%); color: white; display: none; }
        .btn-home { background: linear-gradient(135deg, #666 0%, #444 100%); color: white; }
        .info {
            background: rgba(51, 153, 255, 0.2); border-left: 4px solid #3399ff;
            padding: 15px; margin-bottom: 20px; border-radius: 8px;
        }
        .placeholder {
            background: rgba(30, 30, 45, 0.8); border: 2px dashed #415a77;
            border-radius: 10px; padding: 60px; text-align: center;
            margin-bottom: 20px; color: #778899;
        }
        .stats {
            background: rgba(30, 30, 45, 0.9); padding: 15px;
            border-radius: 10px; margin-bottom: 20px; display: none;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { color: #8ab4f8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Face Recognition</h1>
            <p>View webcam and trained data</p>
        </div>
        
        <div class="card">
            <div class="info" id="info-box">
                <strong>ℹ️ Loading...</strong><br>Checking for trained data...
            </div>
            
            <div class="placeholder" id="placeholder">
                <h2>📹</h2>
                <p>Click Start to view webcam</p>
            </div>
            
            <video id="video" autoplay playsinline></video>
            
            <div class="stats" id="stats">
                <div class="stats-grid">
                    <div><div class="stat-value" style="color: #4dbb6f;" id="people-count">0</div><div class="stat-label">People</div></div>
                    <div><div class="stat-value" style="color: #3399ff;" id="photos-count">0</div><div class="stat-label">Photos</div></div>
                    <div><div class="stat-value" style="color: #8ab4f8;">Active</div><div class="stat-label">Status</div></div>
                </div>
            </div>
            
            <button class="btn btn-start" id="start-btn" onclick="startRecognition()">▶️ Start</button>
            <button class="btn btn-stop" id="stop-btn" onclick="stopRecognition()">⏹️ Stop</button>
            <a href="/" class="btn btn-home">🏠 Home</a>
        </div>
    </div>
    
    <script>
        let video, trainedData = null;
        
        window.addEventListener('load', async () => {
            video = document.getElementById('video');
            try {
                const response = await fetch('/get_trained_data');
                trainedData = await response.json();
                if (trainedData && trainedData.names && trainedData.names.length > 0) {
                    document.getElementById('info-box').innerHTML = 
                        `<strong>✓ Ready!</strong><br>Trained: ${trainedData.names.join(', ')}`;
                } else {
                    document.getElementById('info-box').innerHTML = 
                        `<strong>⚠️ No Data</strong><br>Please capture faces first!`;
                }
            } catch (err) {
                document.getElementById('info-box').innerHTML = 
                    `<strong>❌ Error</strong><br>Could not load data: ${err.message}`;
            }
        });
        
        async function startRecognition() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'block';
                document.getElementById('stats').style.display = 'block';
                if (trainedData && trainedData.embeddings) {
                    const totalPhotos = trainedData.embeddings.reduce((sum, emb) => sum + emb.length, 0);
                    document.getElementById('people-count').textContent = trainedData.names.length;
                    document.getElementById('photos-count').textContent = totalPhotos;
                }
            } catch (error) {
                alert('Camera error: ' + error.message);
            }
        }
        
        function stopRecognition() {
            if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
            video.style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
        }
    </script>
</body>
</html>
