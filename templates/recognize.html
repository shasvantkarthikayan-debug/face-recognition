<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacePass - Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .card {
            background: rgba(20, 20, 35, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        #video-feed {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn-start {
            background: linear-gradient(135deg, #4dbb6f 0%, #2d8a4f 100%);
            color: white;
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #cc3366 0%, #991144 100%);
            color: white;
            display: none;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            color: white;
        }
        
        .info {
            background: rgba(51, 153, 255, 0.2);
            border-left: 4px solid #3399ff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .placeholder {
            background: rgba(30, 30, 45, 0.8);
            border: 2px dashed #415a77;
            border-radius: 10px;
            padding: 60px;
            text-align: center;
            margin-bottom: 20px;
            color: #778899;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Face Recognition</h1>
            <p>Real-time face recognition system</p>
        </div>
        
        <div class="card">
            <div class="info">
                <strong>ℹ️ Instructions:</strong><br>
                Click "Start Recognition" to begin real-time face detection and recognition. The system will identify known faces and display accuracy metrics.
            </div>
            
            <div class="placeholder" id="placeholder">
                <h2>📹</h2>
                <p>Video feed will appear here</p>
            </div>
            
            <img id="video-feed" src="" alt="Video Feed">
            
            <button class="btn btn-start" id="start-btn" onclick="startRecognition()">▶️ Start Recognition</button>
            <button class="btn btn-stop" id="stop-btn" onclick="stopRecognition()">⏹️ Stop Recognition</button>
            <a href="/" class="btn btn-home">🏠 Back to Home</a>
        </div>
    </div>
    
    <script>
        function startRecognition() {
            fetch('/start_recognition', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'started') {
                    document.getElementById('video-feed').src = '/video_feed';
                    document.getElementById('video-feed').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('start-btn').style.display = 'none';
                    document.getElementById('stop-btn').style.display = 'block';
                }
            })
            .catch(error => {
                alert('Error starting recognition: ' + error.message);
            });
        }
        
        function stopRecognition() {
            fetch('/stop_recognition', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'stopped') {
                    document.getElementById('video-feed').style.display = 'none';
                    document.getElementById('placeholder').style.display = 'block';
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('stop-btn').style.display = 'none';
                    document.getElementById('video-feed').src = '';
                }
            })
            .catch(error => {
                alert('Error stopping recognition: ' + error.message);
            });
        }
    </script>
</body>
</html>
